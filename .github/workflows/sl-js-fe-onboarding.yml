# Place as: .github/workflows/sealights-onboarding-js-fe.yml
# Repo: https://github.com/katerinaozerova1/demo_js_fe
#
# SeaLights Node FE: scan+instrument app/ → "deploy" instrumented static files into app/ →
# serve with npm start → Cypress via sealights-cypress-plugin (browser agent, not remote).
#
# Fixes vs the old sample:
# - CYPRESS_SL_ENABLE_REMOTE_AGENT is false for the job (and was only partially overridden before).
# - CYPRESS_SL_BUILD_SESSION_ID is written to GITHUB_ENV (the old "export" step does not apply to the next step).
# - cypress run uses a virtual display (xvfb) + --headed so a real browser process is used in CI.
# - Branch, base URL, commit+push of a non-comment stamp, stricter app health check.

name: SeaLights Onboarding - JS FE

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sealights-fe-onboarding-${{ github.ref }}
  cancel-in-progress: false

env:
  HUSKY: 0
  # Kitchensink specs hardcode cy.visit('http://localhost:8080/...') — keep PORT at 8080.
  PORT: 8080
  CYPRESS_BASE_URL: http://127.0.0.1:8080
  CYPRESS_SL_TEST_STAGE: "Cypress Tests"
  CYPRESS_SL_LAB_ID: "nodetests"
  CYPRESS_SL_ENABLE_REMOTE_AGENT: "false"
  # Avoid “tput: No value for $TERM” noise from Cypress/Electron in CI
  TERM: xterm

jobs:
  sealights-onboarding:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Use npm 10.8.2
        run: npm install -g npm@10.8.2

      - name: Disable Husky in CI
        run: echo "HUSKY=0" >> $GITHUB_ENV

      # package.json "prepare" runs `node .husky/install.mjs` — that file is often missing; HUSKY=0
      # does not skip a custom prepare script. --ignore-scripts avoids the failure; Cypress is installed explicitly next.
      - name: Install dependencies (incl. slnodejs, cypress, sealights-cypress-plugin)
        run: npm install --ignore-scripts

      # --- Non-operational change: real <script> so SL sees a code change (not comment-only) ---
      - name: Inject per-run stamp into app/index.html
        run: |
          node <<'NODE'
          const fs = require("fs");
          const p = "app/index.html";
          const stamp = "run_${{ github.run_id }}_${{ github.run_attempt }}";
          let h = fs.readFileSync(p, "utf8");
          const inj = "\n<script>window.__SL_DEMO_STAMP=" + JSON.stringify(stamp) + ";</script>\n";
          if (h.includes("__SL_DEMO_STAMP")) {
            h = h.replace(/<script>window\.__SL_DEMO_STAMP=[\s\S]*?<\/script>/, inj.trim());
          } else {
            h = h.replace(/<\/body>/i, inj + "</body>");
          }
          fs.writeFileSync(p, h);
          NODE

      - name: Commit and push build stamp
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: SeaLights FE stamp in app (run ${{ github.run_id }})"
          git push

      - name: Create SeaLights token file
        run: |
          echo "${{ secrets.SL_TOKEN }}" > sltoken.txt
          chmod 600 sltoken.txt

      - name: Configure SeaLights build
        run: |
          npx slnodejs config \
            --tokenfile ./sltoken.txt \
            --appname demo_js_fe \
            --branch "${{ github.ref_name }}" \
            --build "$(date +"%y%m%d_%H%M")"

      - name: Scan and instrument browser FE
        run: |
          npx slnodejs scan \
            --tokenfile ./sltoken.txt \
            --buildsessionidfile buildSessionId \
            --labid nodetests \
            --instrumentForBrowsers \
            --workspacepath ./app \
            --outputpath sl_app \
            --scm none \
            --es6Modules

      - name: Deploy instrumented app (replace static app folder)
        run: |
          rm -rf app_original
          mv app app_original
          mv sl_app app

      - name: Expose build session to Cypress
        run: |
          # Next steps automatically receive CYPRESS_SL_BUILD_SESSION_ID
          bsid=$(tr -d ' \t\n\r' < buildSessionId)
          echo "CYPRESS_SL_BUILD_SESSION_ID=$bsid" >> "$GITHUB_ENV"
          test -n "$bsid" || (echo "buildSessionId is empty" && exit 1)

      - name: Start instrumented app
        id: start_app
        run: |
          set -e
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:${PORT}/" > /dev/null 2>&1; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              echo "App is up on port ${PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready; server.log:" >&2
          cat server.log >&2 || true
          exit 1

      - name: Install Xvfb (virtual display for headed browser in CI)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # Cypress 10+ requires a root config file (e.g. cypress.config.js). If your fork omitted it,
      # generate the same minimal shape as cypress-io/cypress-example-kitchensink plus baseUrl for PORT.
      - name: Ensure Cypress root config exists
        run: |
          if [ -f cypress.config.js ] || [ -f cypress.config.mjs ] || [ -f cypress.config.ts ] || [ -f cypress.config.cjs ]; then
            echo "Cypress config already present"
            exit 0
          fi
          printf '%s\n' \
            "module.exports = {" \
            "  projectId: '4b7344'," \
            "  e2e: {" \
            "    baseUrl: 'http://127.0.0.1:8080'," \
            "    specPattern: 'cypress/e2e/**/*.cy.js'," \
            "    supportFile: 'cypress/support/e2e.js'," \
            "  }," \
            "};" \
            > cypress.config.js

      - name: Verify Cypress binary
        run: npx cypress install

      - name: Run Cypress with SeaLights plugin
        env:
          CYPRESS_SL_TOKEN: ${{ secrets.SL_TOKEN }}
        run: |
          if [ -z "$CYPRESS_SL_BUILD_SESSION_ID" ]; then
            echo "CYPRESS_SL_BUILD_SESSION_ID is not set" >&2
            exit 1
          fi
          set -e
          # Headed + virtual framebuffer = real browser for SeaLights agent / test stage; plugin wraps this command
          xvfb-run -a --server-args='-screen 0 1280x1024x24' \
            npx sealights-cypress-plugin \
            npx cypress run --headed --browser electron \
            --spec "cypress/e2e/**/*.cy.js" 2>&1 | tee cypress_output.txt

      - name: Stop app and remove token file
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi
          pkill -f "serve" 2>/dev/null || true
          pkill -f "scripts/start" 2>/dev/null || true
          rm -f sltoken.txt
          echo "Cleanup done"
